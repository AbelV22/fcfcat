name: 📅 Weekly Public Update — All FCF

# ─────────────────────────────────────────────────────────────────────────────
# Runs every Monday at 06:00 UTC (8:00 CET).
# After the weekend all matches are played → fresh standings + results.
#
# Jobs:
#   1. update-public-data  — scrapes ALL competitions → Supabase
#   2. update-referee-db   — matrix: one job per referee competition
#   3. push-referee-db     — pushes merged global_referees.json → Supabase
#
# Required GitHub Secrets:
#   SUPABASE_URL          — https://xxxx.supabase.co
#   SUPABASE_SERVICE_KEY  — service_role key
# ─────────────────────────────────────────────────────────────────────────────

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC

  workflow_dispatch:
    inputs:
      update_referee_db:
        description: 'Re-scrape referee DB?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      season:
        description: 'Season code'
        required: false
        default: '2526'

jobs:

  # ── Job 1: Update public standings + results ──────────────────────────────
  update-public-data:
    name: Update standings + results + scorers
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape all competitions → Supabase
        env:
          PYTHONIOENCODING: utf-8
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m scraper.build_public_db --season ${{ inputs.season || '2526' }}

      - name: Summary
        if: always()
        run: |
          echo "## 📅 Weekly Public Update — $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "All FCF competitions updated in Supabase." >> $GITHUB_STEP_SUMMARY

  # ── Job 2: Referee DB — one job per competition (matrix) ──────────────────
  update-referee-db:
    name: Referee DB — ${{ matrix.competition }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ inputs.update_referee_db != 'false' }}

    strategy:
      fail-fast: false   # Keep going even if one competition fails
      matrix:
        competition:
          # Adult (Primera Catalana and above)
          - primera-catalana
          - segona-catalana
          - lliga-elit
          - tercera-federacio
          # Juvenil (Preferent and above)
          - divisio-honor-juvenil
          - lliga-nacional-juvenil
          - preferent-juvenil
          # Cadet S16 (DH + Preferent)
          - divisio-honor-cadet-s16
          - preferent-cadet-s16
          # Cadet S15 (DH + Preferent)
          - divisio-honor-cadet-s15
          - preferent-cadet-s15
          # Infantil S14 (DH + Preferent)
          - divisio-honor-infantil-s14
          - preferent-infantil-s14
          # Infantil S13 (DH + Preferent)
          - divisio-honor-infantil-s13
          - preferent-infantil-s13

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape referee actas — ${{ matrix.competition }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m scraper.build_referee_db \
            --competition ${{ matrix.competition }} \
            --season ${{ inputs.season || '2526' }} \
            --rate-limit 1.5

      - name: Upload referee data artifact
        uses: actions/upload-artifact@v4
        with:
          name: referees-${{ matrix.competition }}
          path: data/global_referees.json
          retention-days: 1

  # ── Job 3: Merge + push global_referees.json → Supabase ──────────────────
  push-referee-db:
    name: Push referee DB → Supabase
    runs-on: ubuntu-latest
    needs: update-referee-db
    if: ${{ inputs.update_referee_db != 'false' }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all referee artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: referees-*
          path: /tmp/referee-artifacts/
          merge-multiple: false

      - name: Merge all artifacts into global_referees.json
        run: |
          python - << 'EOF'
          import json, os
          from pathlib import Path

          base = Path("data/global_referees.json")
          merged = json.loads(base.read_text(encoding="utf-8")) if base.exists() else {}
          print(f"Base: {len(merged)} entries")

          artifacts_dir = Path("/tmp/referee-artifacts")
          for artifact_file in sorted(artifacts_dir.rglob("global_referees.json")):
              try:
                  data = json.loads(artifact_file.read_text(encoding="utf-8"))
                  before = len(merged)
                  merged.update(data)
                  print(f"  {artifact_file.parent.name}: +{len(merged)-before} new entries")
              except Exception as e:
                  print(f"  WARN: {artifact_file}: {e}")

          base.parent.mkdir(exist_ok=True)
          base.write_text(json.dumps(merged, ensure_ascii=False, indent=2), encoding="utf-8")
          print(f"Merged total: {len(merged)} entries")
          EOF

      - name: Push merged global_referees.json → Supabase
        env:
          PYTHONIOENCODING: utf-8
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -c "
          import json
          from pathlib import Path
          from scraper.supabase_uploader import push_referee_matches
          refs = json.loads(Path('data/global_referees.json').read_text(encoding='utf-8'))
          n = push_referee_matches(refs)
          print(f'Pushed {n} referee matches to Supabase')
          "

      - name: Commit updated global_referees.json
        run: |
          git config user.name  "FCF Bot"
          git config user.email "bot@fcfcat.github.io"
          git add data/global_referees.json
          git diff --staged --quiet && echo "No changes to referees" || \
            git commit -m "data: weekly referee DB update $(date -u '+%Y-%m-%d')" && \
            git push origin HEAD

      - name: Referee summary
        if: always()
        run: |
          COUNT=$(python -c "import json; d=json.load(open('data/global_referees.json')); print(len(d))" 2>/dev/null || echo "?")
          echo "## 🕵️ Referee DB Updated" >> $GITHUB_STEP_SUMMARY
          echo "Total matches in referee DB: **$COUNT**" >> $GITHUB_STEP_SUMMARY

  # ── Job 4: Reminder for registered teams ──────────────────────────────────
  update-registered-teams:
    name: Update registered teams
    runs-on: ubuntu-latest
    needs: update-public-data
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check registered teams count
        run: |
          COUNT=$(python -c "import json; r=json.load(open('data/teams_registry.json')); print(len(r.get('teams', [])))" 2>/dev/null || echo "0")
          echo "Registered teams: $COUNT"
          echo "Registered teams are updated by the daily scrape workflow (scrape-scheduled.yml)."
