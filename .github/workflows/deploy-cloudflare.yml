name: 🚀 Deploy to Cloudflare Workers

# Deploys the Next.js frontend to Cloudflare Workers (via OpenNext).
#
# Triggers:
#   - Push to master that touches procoach-next/ files
#   - After the weekly data pipeline completes (auto-redeploy with fresh data)
#   - Manual dispatch
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN      — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID     — Your Cloudflare account ID
#   NEXT_PUBLIC_SUPABASE_URL  — Supabase project URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY — Supabase anon (public) key

on:
  push:
    branches: [master]
    paths:
      - 'procoach-next/**'
      - 'data/teams/**'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_run:
    workflows: ["📅 FCF Weekly Pipeline — Self-Maintaining"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Only deploy if the triggering workflow succeeded (or it's a direct push/manual)
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: procoach-next/package-lock.json

      - name: Install dependencies
        working-directory: procoach-next
        run: npm ci

      - name: Build for Cloudflare Workers (OpenNext)
        working-directory: procoach-next
        run: npx @opennextjs/cloudflare@latest build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: procoach-next
          command: deploy
