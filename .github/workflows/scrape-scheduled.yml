name: ⏰ Scrape FCF - Daily Auto Update

# ────────────────────────────────────────────────────────────────────────────
# Runs automatically every day at 07:00 UTC (9:00 CET / 8:00 CEST)
# for ALL registered teams in data/teams_registry.json
# ────────────────────────────────────────────────────────────────────────────

permissions:
  contents: write

on:
  schedule:
    - cron: '0 7 * * *'   # Every day at 07:00 UTC
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Forzar scrape completo de todas las actas'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  load-registry:
    name: Load Teams Registry
    runs-on: ubuntu-latest
    outputs:
      teams: ${{ steps.load.outputs.teams }}
      count: ${{ steps.load.outputs.count }}

    steps:
      - uses: actions/checkout@v4

      - name: Load teams registry
        id: load
        run: |
          TEAMS=$(python -c "
          import json
          registry = json.load(open('data/teams_registry.json'))
          teams = registry.get('teams', [])
          print(json.dumps(teams))
          ")
          COUNT=$(python -c "import json; print(len(json.loads('$TEAMS')))" 2>/dev/null || echo "0")
          echo "teams=$TEAMS" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Loaded $COUNT registered teams"

  scrape-all-teams:
    name: Scrape — ${{ matrix.team.team_keyword }}
    runs-on: ubuntu-latest
    needs: load-registry
    timeout-minutes: 45
    if: needs.load-registry.outputs.count != '0'

    strategy:
      fail-fast: false
      matrix:
        team: ${{ fromJson(needs.load-registry.outputs.teams) }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper for team
        env:
          PYTHONIOENCODING: utf-8
        run: |
          TEAM='${{ matrix.team.team_keyword }}'
          SEASON='${{ matrix.team.season }}'
          COMPETITION='${{ matrix.team.competition }}'
          GROUP='${{ matrix.team.group }}'
          FULL='${{ inputs.force_full || 'false' }}'

          # Mondays: run full scrape (after weekend matches)
          DOW=$(date +%u)
          if [ "$DOW" = "1" ]; then
            echo "Monday → full scrape (weekend games processed)"
            FULL="true"
          fi

          CMD="python -m scraper.main --team \"$TEAM\" --season \"$SEASON\" --competition \"$COMPETITION\" --group \"$GROUP\""
          if [ "$FULL" = "true" ]; then
            CMD="$CMD --full"
          fi

          echo "Running: $CMD"
          eval $CMD

      - name: Validate & check output
        run: |
          python -c "
          import json, sys
          from pathlib import Path

          data = json.loads(Path('data/fcf_data.json').read_text(encoding='utf-8'))
          val = data.get('validation', {})
          actas = data.get('actas', [])

          print(f'Actas: {len(actas)}, Validation: {val.get(\"accuracy_pct\", 0):.1f}%')

          if len(actas) == 0:
              print('ERROR: No actas scraped')
              sys.exit(1)
          "

      - name: Push player stats to Supabase
        if: env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_KEY != ''
        env:
          PYTHONIOENCODING: utf-8
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          pip install supabase -q
          COMPETITION='${{ matrix.team.competition }}'
          GROUP='${{ matrix.team.group }}'
          SEASON='${{ matrix.team.season }}'
          python -c "
          import json, os, sys
          from pathlib import Path
          from scraper.supabase_uploader import push_player_stats, push_standings, push_matches, push_scorers

          data = json.loads(Path('data/fcf_data.json').read_text(encoding='utf-8'))
          comp   = os.environ.get('COMPETITION', '$COMPETITION')
          group  = os.environ.get('GROUP', '$GROUP')
          season = os.environ.get('SEASON', '$SEASON')

          if data.get('standings'):
              push_standings(data['standings'], comp, group, season)
          if data.get('matches'):
              push_matches(data['matches'], comp, group, season)
          if data.get('team_intelligence'):
              push_player_stats(data['team_intelligence'], comp, group, season)
          if data.get('rival_intelligence'):
              push_player_stats(data['rival_intelligence'], comp, group, season)
          print('Supabase push complete')
          " || echo "Supabase push skipped (check secrets)"

      - name: Generate HTML report
        env:
          PYTHONIOENCODING: utf-8
        run: |
          TEAM_ID='${{ matrix.team.id }}'
          mkdir -p data/teams reports
          cp data/fcf_data.json "data/teams/${TEAM_ID}.json"
          python -m scraper.report \
            --input "data/teams/${TEAM_ID}.json" \
            --output "reports/${TEAM_ID}.html"
          echo "Saved data/teams/${TEAM_ID}.json and reports/${TEAM_ID}.html"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcf-${{ matrix.team.id }}-${{ github.run_number }}
          path: |
            data/teams/${{ matrix.team.id }}.json
            reports/${{ matrix.team.id }}.html
          retention-days: 7

  commit-results:
    name: Commit All Results
    runs-on: ubuntu-latest
    needs: scrape-all-teams
    if: always() && needs.scrape-all-teams.result != 'skipped'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge artifacts into data/teams/ and reports/
        run: |
          mkdir -p data/teams reports
          find artifacts/ -name "*.json" -exec cp {} data/teams/ \;
          find artifacts/ -name "*.html" -exec cp {} reports/ \;
          echo "Files in data/teams/:"
          ls -la data/teams/
          echo "Files in reports/:"
          ls -la reports/

      - name: Commit & push
        run: |
          git config user.name  "FCF Bot"
          git config user.email "bot@fcfcat.github.io"
          git add data/teams/ reports/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "data: daily update $(date -u '+%Y-%m-%d') — all teams" && \
            git push origin HEAD

      - name: Job summary
        run: |
          echo "## ⏰ Daily Scrape Complete — $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Team file | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          for f in data/teams/*.json; do
            SIZE=$(wc -c < "$f")
            echo "| $(basename $f) | ${SIZE} bytes |" >> $GITHUB_STEP_SUMMARY
          done
